version: '3.8'
services:
  web:
    build: .
    container_name: farmi_web_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html/hi
    environment:
      - DB_HOST=db
      - DB_NAME=farmi_qly
      - DB_USER=root
      - DB_PASSWORD=root
    depends_on:
      - db
  db:
    image: mysql:8.0
    container_name: farmi_mysql_db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: farmi_qly
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./farmi_qly.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
